name: PerPilot Load Testing Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      virtual_users:
        description: Number of Virtual Users
        required: false
        default: '10'
      duration:
        description: Test duration (e.g. 5m)
        required: false
        default: 5m

jobs:

  target-application:
    name: 01 - Target Application
    runs-on: ubuntu-latest
    steps:
      - name: Set Target Application
        run: |
          echo "============================================"
          echo " 01 TARGET APPLICATION"
          echo " URL  : https://jsonplaceholder.typicode.com"
          echo " ENV  : production"
          echo " TOOL : k6"
          echo "============================================"

  nfr-gathering:
    name: 02 - NFR Gathering
    runs-on: ubuntu-latest
    needs: target-application
    steps:
      - name: Define Non-Functional Requirements
        run: |
          echo "============================================"
          echo " 02 NFR GATHERING"
          echo " P95 Response Time : 2000ms max"
          echo " Error Rate        : 1% max"
          echo " Throughput        : 100 req/s min"
          echo " Availability      : 99.9% min"
          echo "============================================"

  workload-design:
    name: 03 - Workload Design
    runs-on: ubuntu-latest
    needs: nfr-gathering
    steps:
      - name: Design Load Scenarios
        run: |
          echo "============================================"
          echo " 03 WORKLOAD DESIGN"
          echo " Scenario 1 : Browse Posts    50pct"
          echo " Scenario 2 : User Journey    30pct"
          echo " Scenario 3 : CRUD Operations 20pct"
          echo " Virtual Users : 10"
          echo " Duration      : 5 minutes"
          echo "============================================"

  script-generation:
    name: 04 - Script Generation
    runs-on: ubuntu-latest
    needs: workload-design
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate k6 Load Test Script
        run: |
          mkdir -p load-tests results
          {
            printf 'import http from "k6/http";\n'
            printf 'import { check, sleep, group } from "k6";\n'
            printf 'import { Rate, Counter } from "k6/metrics";\n'
            printf '\n'
            printf 'const errorRate = new Rate("error_rate");\n'
            printf 'const totalRequests = new Counter("total_requests");\n'
            printf '\n'
            printf 'export const options = {\n'
            printf '  vus: 10,\n'
            printf '  duration: "5m",\n'
            printf '  thresholds: {\n'
            printf '    http_req_duration: ["p(95)<2000"],\n'
            printf '    http_req_failed: ["rate<0.01"],\n'
            printf '    error_rate: ["rate<0.01"],\n'
            printf '  },\n'
            printf '};\n'
            printf '\n'
            printf 'const BASE = "https://jsonplaceholder.typicode.com";\n'
            printf '\n'
            printf 'function browsePosts() {\n'
            printf '  group("Browse Posts", function() {\n'
            printf '    var r1 = http.get(BASE + "/posts");\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r1, {"posts 200": function(r){return r.status===200;}}) || errorRate.add(1);\n'
            printf '    var id = Math.floor(Math.random()*100)+1;\n'
            printf '    var r2 = http.get(BASE + "/posts/" + id);\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r2, {"post 200": function(r){return r.status===200;}}) || errorRate.add(1);\n'
            printf '    var r3 = http.get(BASE + "/posts/" + id + "/comments");\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r3, {"comments 200": function(r){return r.status===200;}}) || errorRate.add(1);\n'
            printf '  });\n'
            printf '  sleep(Math.random()*2+1);\n'
            printf '}\n'
            printf '\n'
            printf 'function userJourney() {\n'
            printf '  group("User Journey", function() {\n'
            printf '    var r1 = http.get(BASE + "/users");\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r1, {"users 200": function(r){return r.status===200;}}) || errorRate.add(1);\n'
            printf '    var uid = Math.floor(Math.random()*10)+1;\n'
            printf '    var r2 = http.get(BASE + "/users/" + uid + "/posts");\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r2, {"uposts 200": function(r){return r.status===200;}}) || errorRate.add(1);\n'
            printf '    var r3 = http.get(BASE + "/users/" + uid + "/todos");\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r3, {"todos 200": function(r){return r.status===200;}}) || errorRate.add(1);\n'
            printf '  });\n'
            printf '  sleep(Math.random()*3+1);\n'
            printf '}\n'
            printf '\n'
            printf 'function crudOps() {\n'
            printf '  group("CRUD Operations", function() {\n'
            printf '    var p = JSON.stringify({title:"LoadTest",body:"k6",userId:1});\n'
            printf '    var h = {headers:{"Content-Type":"application/json"}};\n'
            printf '    var r1 = http.post(BASE + "/posts", p, h);\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r1, {"create 201": function(r){return r.status===201;}}) || errorRate.add(1);\n'
            printf '    var p2 = JSON.stringify({id:1,title:"Updated",body:"upd",userId:1});\n'
            printf '    var r2 = http.put(BASE + "/posts/1", p2, h);\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r2, {"update 200": function(r){return r.status===200;}}) || errorRate.add(1);\n'
            printf '    var r3 = http.del(BASE + "/posts/1");\n'
            printf '    totalRequests.add(1);\n'
            printf '    check(r3, {"delete 200": function(r){return r.status===200;}}) || errorRate.add(1);\n'
            printf '  });\n'
            printf '  sleep(Math.random()*2+1);\n'
            printf '}\n'
            printf '\n'
            printf 'export default function() {\n'
            printf '  var rnd = Math.random();\n'
            printf '  if (rnd < 0.5) { browsePosts(); }\n'
            printf '  else if (rnd < 0.8) { userJourney(); }\n'
            printf '  else { crudOps(); }\n'
            printf '}\n'
            printf '\n'
            printf 'export function setup() { console.log("PerPilot: VUs=10 Duration=5m"); }\n'
            printf 'export function teardown() { console.log("PerPilot: Test Complete"); }\n'
          } > load-tests/load-test.js
          echo "Script generated:"
          wc -l load-tests/load-test.js

      - name: Upload k6 Script
        uses: actions/upload-artifact@v4
        with:
          name: k6-load-test-script
          path: load-tests/load-test.js

  load-test-execution:
    name: 05 - Load Test Execution
    runs-on: ubuntu-latest
    needs: script-generation
    outputs:
      test_result: ${{ steps.run-test.outputs.result }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download k6 Script
        uses: actions/download-artifact@v4
        with:
          name: k6-load-test-script
          path: load-tests/

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -q
          sudo apt-get install k6 -y -q
          k6 version

      - name: Run k6 Load Test
        id: run-test
        run: |
          VUS=${{ github.event.inputs.virtual_users || '10' }}
          DURATION=${{ github.event.inputs.duration || '5m' }}
          mkdir -p results
          echo "============================================"
          echo " 05 LOAD TEST EXECUTION"
          echo " VUs     : ${VUS}"
          echo " Duration: ${DURATION}"
          echo " Target  : https://jsonplaceholder.typicode.com"
          echo "============================================"
          k6 run \
            --vus "${VUS}" \
            --duration "${DURATION}" \
            --summary-export results/k6-summary.json \
            load-tests/load-test.js 2>&1 | tee results/k6-output.txt
          STATUS=${PIPESTATUS[0]}
          if [ "${STATUS}" -eq 0 ]; then
            echo "result=PASSED" >> "$GITHUB_OUTPUT"
            echo "PASSED - All thresholds met"
          else
            echo "result=FAILED" >> "$GITHUB_OUTPUT"
            echo "FAILED - Check results"
          fi

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: results/

  store-results:
    name: 06 - Store Results to GitHub
    runs-on: ubuntu-latest
    needs: load-test-execution
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: load-test-results
          path: results/
        continue-on-error: true

      - name: Publish Summary
        if: always()
        run: |
          RESULT=${{ needs.load-test-execution.outputs.test_result || 'N/A' }}
          echo "## PerPilot Load Test Pipeline Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Name | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 01 | Target Application | Done |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 02 | NFR Gathering | Done |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 03 | Workload Design | Done |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 04 | Script Generation | Done |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 05 | Load Test Execution | ${RESULT} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 06 | Store Results | Done |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Config | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target URL | https://jsonplaceholder.typicode.com |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Virtual Users | 10 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Duration | 5 minutes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool | k6 |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "*Generated by PerPilot AI Load Testing Pipeline*" >> "$GITHUB_STEP_SUMMARY"

      - name: Store Gist
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            var result = '${{ needs.load-test-execution.outputs.test_result }}' || 'N/A';
            var ts = new Date().toISOString();
            var lines = [
              '# PerPilot Load Test Results',
              'Timestamp: ' + ts,
              'Result: ' + result,
              'Target: https://jsonplaceholder.typicode.com',
              'VUs: 10 | Duration: 5m | Tool: k6',
              'Run: ' + context.runNumber,
            ];
            try {
              var g = await github.rest.gists.create({
                description: 'PerPilot Results ' + ts,
                public: false,
                files: { 'results.md': { content: lines.join('\n') } }
              });
              console.log('Gist: ' + g.data.html_url);
            } catch(e) { console.log('Gist error: ' + e.message); }

      - name: Complete
        run: |
          echo "============================================"
          echo " PERPILOT PIPELINE COMPLETE"
          echo " 01 Target Application  : Done"
          echo " 02 NFR Gathering       : Done"
          echo " 03 Workload Design     : Done"
          echo " 04 Script Generation   : Done"
          echo " 05 Load Test Execution : Done"
          echo " 06 Store Results       : Done"
          echo "============================================"
